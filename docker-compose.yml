# VeraDoc stack: Postgres + Django REST Framework (verification runs in-process via background threads).
# 1) cp .env.example .env  and fill secrets (JWT_SECRET, GROQ_API_KEY, SQUAD_SECRET_KEY, …)
# 2) docker compose up --build
# 3) API: http://localhost:8000  — set SQUAD_CALLBACK_URL to your frontend after-pay page (e.g. http://localhost:3000/credits/callback). In Squad dashboard, set the webhook to this API's POST /api/verify/webhook (public HTTPS, e.g. ngrok).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: veradoc
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d veradoc"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/veradoc
    ports:
      - "8000:8000"
    volumes:
      - storage_data:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --fake-initial --noinput &&
      gunicorn veradoc.wsgi:application --bind 0.0.0.0:8000 --workers 2 --threads 4 --timeout 120"

volumes:
  postgres_data:
  storage_data:
